name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.repository }}-release-drafter-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  update-release-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      resolved_version: ${{ steps.release_drafter.outputs.resolved_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Update release draft
        id: release_drafter
        uses: release-drafter/release-drafter@v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-name: release-drafter.yml

  bump-versions:
    # Only on merges to main — PR runs above are just a preview of the next resolved
    # version and must not touch package.json before the PR is even merged.
    if: github.event_name == 'push'
    needs: update-release-draft
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v7.0.1
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      # release-drafter's resolved_version is the single source of truth for "what
      # version comes next" — write it straight into every package.json instead of
      # re-deriving a bump from labels ourselves, so the two can never disagree.
      # bump-version.mjs writes plain 2-space-indented JSON, already matching this
      # repo's Prettier config for package.json, so no install/format step is needed.
      - name: Set package.json versions to the resolved release version
        run: node scripts/bump-version.mjs "${{ needs.update-release-draft.outputs.resolved_version }}"

      - name: Commit and push (if changed)
        run: |
          if git diff --quiet; then
            echo "package.json already at the resolved version — nothing to commit."
            exit 0
          fi
          VERSION="$(node -p "require('./package.json').version")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json packages/*/package.json
          git commit -m "chore: bump version to v${VERSION} [skip ci]"
          git push origin main
