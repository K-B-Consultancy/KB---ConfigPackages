name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Packages are versioned in lockstep with the root package.json. A release
      # whose tag doesn't match would publish artifacts that can't be traced back
      # to it — fail before publishing anything.
      - name: Verify release tag matches package versions
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for f in package.json packages/*/package.json; do
            V="$(node -p "require('./$f').version")"
            if [ "$V" != "$TAG" ]; then
              echo "::error file=$f::version $V does not match release tag $TAG"
              exit 1
            fi
          done

      - name: Verify
        run: pnpm lint && pnpm test && pnpm build

      - name: Publish packages
        run: pnpm -r --filter "@k-b-consultancy/*" publish --no-git-checks --access public
