name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Packages are versioned in lockstep with the root package.json. A release
      # whose tag doesn't match would publish artifacts that can't be traced back
      # to it — fail before publishing anything.
      - name: Verify release tag matches package versions
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for f in package.json packages/*/package.json; do
            V="$(node -p "require('./$f').version")"
            if [ "$V" != "$TAG" ]; then
              echo "::error file=$f::version $V does not match release tag $TAG"
              exit 1
            fi
          done

      - name: Verify
        run: pnpm lint && pnpm test && pnpm build

      # A "[WARN] Skipped OIDC: ..." line in this step is expected and harmless.
      # pnpm always attempts npmjs-style OIDC trusted publishing when it detects
      # GitHub Actions, but GitHub Packages doesn't implement the token-exchange
      # endpoint, so the attempt can never succeed here:
      #   - without `id-token: write` → "Incorrect permissions for idToken" warning
      #   - with `id-token: write`    → a different warning from the failed exchange
      # pnpm 11 has no setting to disable the attempt (verified in pnpm source);
      # it falls back to NODE_AUTH_TOKEN and publishes normally. Don't re-add the
      # id-token permission to chase the warning — it only changes the message.
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm -r --filter "@k-b-consultancy/*" publish --no-git-checks
