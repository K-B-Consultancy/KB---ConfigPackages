# Org-wide lefthook pre-commit hooks — canonical config (synced from KB-Documentation).
# lefthook reads this file from the repo root, so COPY it there at project init:
#
#   cp .ai-docs/config/lefthook.yml lefthook.yml && pnpm exec lefthook install
#
# When a sync PR touches this file, the reviewer of that sync PR re-copies it to
# the repo root in the same PR (no CI guard diffs the two, because the root copy
# may legitimately carry app-path adjustments).
# Org policy: .ai-docs/00-org-wide/CODE_QUALITY.md § Pre-commit hooks.
pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,css,md,yml,yaml}"
      run: pnpm exec prettier --check {staged_files}
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint --max-warnings 0 {staged_files}
    # Java apps: spotless checks the whole app; scoped-to-staged isn't supported.
    # Adjust the app path if the API doesn't live at apps/api.
    spotless:
      glob: "apps/api/**/*.java"
      run: cd apps/api && ./mvnw -q spotless:check
    secrets:
      run: git secrets --scan {staged_files}
